services:
  - type: web
    name: loyalgenie-backend
    runtime: node
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PG_POOL_MAX
        value: "2"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_AUTH_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://www.loyalgenie.in
      - key: MSG91_AUTH_KEY
        sync: false
      - key: MSG91_OTP_TEMPLATE_ID
        sync: false
      - key: MSG91_SENDER_ID
        sync: false
      - key: MSG91_ROUTE
        value: "4"
      - key: MSG91_API_MODE
        value: sms
      - key: MSG91_OTP_EXPIRY
        value: "10"
      - key: MSG91_OTP_LENGTH
        value: "6"
      - key: MSG91_EMAIL_OTP_TEMPLATE_ID
        value: loyalgenie_otp
      - key: MSG91_EMAIL_DOMAIN
        sync: false
      - key: MSG91_EMAIL_FROM
        sync: false
      - key: MSG91_EMAIL_FROM_NAME
        value: LoyalGenie
      - key: MSG91_COMPANY_NAME
        value: LoyalGenie
